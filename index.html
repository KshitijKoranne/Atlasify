<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- SVG for modern browsers, sized PNGs for fallback, apple-touch-icon for iOS -->
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Atlasify — Free Map Poster Generator | 23 Themes, Print-Ready Exports</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Turn any place into a stunning map poster. 23 hand-crafted themes, PNG/PDF/SVG exports, hi-res up to 8K. Free, no sign-up, works in your browser."
    />
    <meta
      name="keywords"
      content="map poster generator, map art, city map poster, custom map print, map wall art, print-ready map, map poster maker, map gift, city poster, travel poster, OpenStreetMap poster, atlasify"
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="author" content="KJR Labs" />
    <meta name="publisher" content="KJR Labs" />
    <link rel="canonical" href="https://atlasifyy.vercel.app" />

    <!-- Theme colour -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Atlasify" />
    <meta name="msapplication-TileColor" content="#000000" />
    <link rel="mask-icon" href="/assets/logo.svg" color="#d4a43a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Atlasify" />
    <meta
      property="og:title"
      content="Atlasify — Turn Any Place Into a Poster"
    />
    <meta
      property="og:description"
      content="23 themes. PNG, PDF, SVG exports. Hi-res up to 8K. Free map poster generator — no sign-up required."
    />
    <meta property="og:url" content="https://atlasifyy.vercel.app" />
    <meta
      property="og:image"
      content="https://atlasifyy.vercel.app/assets/banner.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Atlasify map poster generator — Tokyo, London, Amsterdam posters in different themes" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kshitijkoranne" />
    <meta name="twitter:creator" content="@kshitijkoranne" />
    <meta
      name="twitter:title"
      content="Atlasify — Turn Any Place Into a Poster"
    />
    <meta
      name="twitter:description"
      content="23 themes. PNG, PDF, SVG exports. Hi-res up to 8K. Free map poster generator — no sign-up required."
    />
    <meta
      name="twitter:image"
      content="https://atlasifyy.vercel.app/assets/banner.png"
    />
    <meta name="twitter:image:alt" content="Atlasify map poster generator — Tokyo, London, Amsterdam posters in different themes" />

    <script type="application/ld+json">

        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern web browser with WebGL support",
        "offers": [
          {
            "@type": "Offer",

            "priceCurrency": "INR"

          "@type": "Organization",
          "name": "KJR Labs",

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
